<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>substância negra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:   #0e0d0b;
      --fg:   #e8e3d9;
      --dim:  #5a5650;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 10;
    }

    /* custom cursor */
    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--fg);
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      transition: opacity .3s, transform .15s;
      opacity: 0;
    }

    /* center link */
    a.entry {
      font-family: 'Special Elite', 'Courier New', monospace;
      font-size: clamp(1.4rem, 5vw, 2.6rem);
      letter-spacing: 0.12em;
      color: var(--fg);
      text-decoration: none;
      position: relative;
      opacity: 0;
      animation: fadeIn 2.2s cubic-bezier(.4,0,.2,1) forwards;
      animation-delay: .4s;
      cursor: none;

      /* subtle underline that grows on hover */
    }

    a.entry::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 1px;
      background: var(--fg);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    a.entry:hover::after {
      width: 100%;
    }

    /* breath animation while idle */
    a.entry:not(:hover) {
      animation: fadeIn 2.2s cubic-bezier(.4,0,.2,1) forwards,
                 breathe 6s ease-in-out 2.6s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: .55; }
    }

    /* vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0,0,0,.55) 100%);
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div class="vignette"></div>
  <div class="cursor" id="cursor"></div>

  <a class="entry" href="index.html">substância negra</a>

  <script>
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', e => {
      cursor.style.opacity = '1';
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    document.addEventListener('mouseleave', () => {
      cursor.style.opacity = '0';
    });
  </script>
</body>
</html>
